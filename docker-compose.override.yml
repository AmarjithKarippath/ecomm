# Local development overlay. Auto-loaded by `docker compose up` (no -f flag
# needed). Adds host port bindings, source bind mounts for hot reload, and
# dev-mode commands. Do NOT use on the VPS — production uses
# docker-compose.prod.yml instead.

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  landing:
    ports:
      - "3000:3000"
    volumes:
      - ./landing:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev -H 0.0.0.0 -p 3000
