# Single production compose file. CloudPanel reverse-proxies to:
#   sainsberry.com, www.sainsberry.com  ->  http://127.0.0.1:3003   (landing)
#   app.sainsberry.com                  ->  http://127.0.0.1:3004   (frontend)
#   api.sainsberry.com                  ->  http://127.0.0.1:8003   (backend)
#
# db + redis are NOT published to the host — they only exist on the internal
# Docker network and are reachable from backend at `db:5432` / `redis:6379`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecomm
      POSTGRES_PASSWORD: ecomm
      POSTGRES_DB: ecomm
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomm"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    ports:
      - "127.0.0.1:8003:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:5173"

  landing:
    build:
      context: ./landing
      args:
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
    ports:
      - "127.0.0.1:3003:3000"

volumes:
  db_data:
  media_data:
