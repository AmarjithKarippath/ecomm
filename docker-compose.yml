# Base service definitions only. NO host port bindings here — those live in
# docker-compose.override.yml (auto-loaded for local dev) and
# docker-compose.prod.yml (explicit -f for production).
#
# Why: Compose v2 *concatenates* the `ports` list across files instead of
# replacing it. Keeping ports in the base file leaks dev mappings into prod
# and prevents the prod override from binding its own ports.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecomm
      POSTGRES_PASSWORD: ecomm
      POSTGRES_DB: ecomm
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomm"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  frontend:
    build: ./frontend
    env_file: .env

  landing:
    build:
      context: ./landing
      target: dev
    environment:
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:5173/login}

volumes:
  db_data:
  media_data:
