server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # robots.txt is shipped as a static asset under /usr/share/nginx/html
    # (Vite copies frontend/public/* into the build), so it's served by the
    # default static handler.

    # sitemap.xml is dynamic — generated by the backend from the store table.
    # Proxy it from this host so search engines see /sitemap.xml on the same
    # origin as the storefront URLs it lists.
    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: unknown routes serve index.html so React Router takes over.
    location / {
        try_files $uri /index.html;
    }
}
